<!doctype html>
<html><head><meta charset="utf-8">
<title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px 24px; background:#fff; }
  .row { display:flex; flex-direction:column; gap:8px; }
  .item { display:grid; grid-template-columns: 70px 1fr 60px; align-items:center; gap:12px; font-size:12px; }
  .item .tok { font-family: ui-monospace, Menlo, monospace; color:var(--text-secondary); }
  .item .bar { height:12px; background:#585DFE; border-radius:4px; }
  .item .val { font-family: ui-monospace, Menlo, monospace; color:var(--text-muted); text-align:right; }
</style>
</head><body>
  <div class="row">
    <div class="item"><span class="tok">--s-1</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
    <div class="item"><span class="tok">--s-2</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div>
    <div class="item"><span class="tok">--s-3</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
    <div class="item"><span class="tok">--s-4</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div>
    <div class="item"><span class="tok">--s-6</span><div class="bar" style="width:24px"></div><span class="val">24px</span></div>
    <div class="item"><span class="tok">--s-8</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div>
    <div class="item"><span class="tok">--s-12</span><div class="bar" style="width:48px"></div><span class="val">48px</span></div>
    <div class="item"><span class="tok">--s-16</span><div class="bar" style="width:64px"></div><span class="val">64px</span></div>
    <div class="item"><span class="tok">--s-24</span><div class="bar" style="width:96px"></div><span class="val">96px</span></div>
  </div>
</body></html>
