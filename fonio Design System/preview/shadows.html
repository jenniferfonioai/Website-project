<!doctype html>
<html><head><meta charset="utf-8">
<title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px 24px; background:#fff; }
  .row { display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; }
  .item { display:flex; flex-direction:column; align-items:flex-start; gap:14px; }
  .box { width:100%; height:80px; background:#fff; border-radius:12px; }
  .tok { font-family: ui-monospace, Menlo, monospace; font-size:12px; color:var(--text-primary); }
  .role { font-size:11px; color:var(--text-muted); margin-top:2px; }
</style>
</head><body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow: var(--shadow-sm)"></div>
      <div><div class="tok">--shadow-sm</div><div class="role">Inputs, subtle lift</div></div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-md)"></div>
      <div><div class="tok">--shadow-md</div><div class="role">Cards — default</div></div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-lg)"></div>
      <div><div class="tok">--shadow-lg</div><div class="role">Modals, popovers</div></div></div>
  </div>
</body></html>
