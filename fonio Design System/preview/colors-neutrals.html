<!doctype html>
<html><head><meta charset="utf-8">
<title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; }
  .swatch { border-radius: 12px; padding:12px; border:1px solid var(--border); min-height:120px; display:flex; flex-direction:column; justify-content:space-between; }
  .swatch .chip { width:36px; height:36px; border-radius:10px; border:1px solid rgba(0,0,0,.06); }
  .swatch .name { font-size:12px; font-weight:500; color:var(--text-primary); margin-top:10px; }
  .swatch .hex  { font-family: ui-monospace, Menlo, monospace; font-size:11px; color:var(--text-secondary); }
  .swatch .role { font-size:10px; color:var(--text-muted); margin-top:2px; line-height:1.3; }
</style>
</head><body>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#F7F8FC"></div>
      <div><div class="name">bg secondary</div><div class="hex">#F7F8FC</div><div class="role">Alt surface</div></div></div>
    <div class="swatch"><div class="chip" style="background:#E1E3F4"></div>
      <div><div class="name">border</div><div class="hex">#E1E3F4</div><div class="role">Primary border</div></div></div>
    <div class="swatch"><div class="chip" style="background:#A4A6B6"></div>
      <div><div class="name">muted</div><div class="hex">#A4A6B6</div><div class="role">Captions, disabled</div></div></div>
    <div class="swatch"><div class="chip" style="background:#555b6e"></div>
      <div><div class="name">text secondary</div><div class="hex">#555b6e</div><div class="role">Subheads, meta</div></div></div>
  </div>
</body></html>
