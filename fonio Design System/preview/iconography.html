<!doctype html>
<html><head><meta charset="utf-8">
<title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-sans); }
  .row { display:grid; grid-template-columns: repeat(8, 1fr); gap:14px; }
  .cell { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .cell svg { width:16px; height:16px; stroke: var(--text-primary); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .lbl { font-size:10px; color:var(--text-muted); font-family: ui-monospace, Menlo, monospace; }
  .note { font-size:11px; color:var(--text-muted); margin-top:18px; line-height:1.5; }
</style>
</head><body>
  <div class="row">
    <div class="cell"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg><span class="lbl">arrow-right</span></div>
    <div class="cell"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg><span class="lbl">check</span></div>
    <div class="cell"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg><span class="lbl">x</span></div>
    <div class="cell"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg><span class="lbl">search</span></div>
    <div class="cell"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg><span class="lbl">menu</span></div>
    <div class="cell"><svg viewBox="0 0 24 24"><path d="M20 12V8a2 2 0 00-2-2H6a2 2 0 00-2 2v8a2 2 0 002 2h7"/><path d="M15 19l2 2 4-4"/></svg><span class="lbl">mail</span></div>
    <div class="cell"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span class="lbl">plus</span></div>
    <div class="cell"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg><span class="lbl">chevron-down</span></div>
  </div>
  <div class="note">Lucide line icons · 16px · stroke-width 2 · inherits <code>currentColor</code></div>
</body></html>
