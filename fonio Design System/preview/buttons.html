<!doctype html>
<html><head><meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; }
  h4 { font-size:13px; font-weight:500; margin:0 0 10px 0; color:var(--text-primary); letter-spacing:.02em; text-transform:uppercase; }
  .block { margin-bottom: 22px; }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .group { display:flex; flex-direction:column; gap:8px; }
  .label { font-family: ui-monospace, Menlo, monospace; font-size:11px; color:var(--text-muted); }
  /* force hover state for the demo column */
  .force-hover.btn-primary  { box-shadow: var(--shadow-md); }
  .force-hover.btn-primary::after,
  .force-hover.btn-secondary::after { opacity: 1 !important; }
  .force-hover.btn-secondary { box-shadow: var(--shadow-md); }
  .force-hover.btn-tertiary  { color: var(--fonio-blau); border-color: var(--fonio-blau); }
</style>
</head><body>

  <div class="block">
    <h4 style="color:var(--text-muted)">Default</h4>
    <div class="row">
      <div class="group"><button class="btn btn-primary">Projekt anfragen</button><div class="label">primary · fonio blau</div></div>
      <div class="group"><button class="btn btn-secondary">Mehr erfahren</button><div class="label">secondary · black</div></div>
      <div class="group"><button class="btn btn-tertiary">Portfolio ansehen</button><div class="label">tertiary · bordered</div></div>
    </div>
  </div>

  <div class="block">
    <h4 style="color:var(--text-muted)">Hover</h4>
    <div class="row">
      <div class="group"><button class="btn btn-primary force-hover">Projekt anfragen</button><div class="label">white fade + shadow</div></div>
      <div class="group"><button class="btn btn-secondary force-hover">Mehr erfahren</button><div class="label">white fade + shadow</div></div>
      <div class="group"><button class="btn btn-tertiary force-hover">Portfolio ansehen</button><div class="label">blau border + blau text</div></div>
    </div>
  </div>

</body></html>
