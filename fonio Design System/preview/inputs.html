<!doctype html>
<html><head><meta charset="utf-8">
<title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; }
  .row { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
  label { display:block; font-size:12px; color:var(--text-secondary); margin-bottom:6px; }
</style>
</head><body>
  <div class="row">
    <div><label>E-Mail</label><input class="input" placeholder="name@fonio.de"></div>
    <div><label>Projekt</label><input class="input" value="Relaunch Website" style="border-color:var(--fonio-blau); box-shadow:0 0 0 3px rgba(88,93,254,.18)"></div>
  </div>
</body></html>
