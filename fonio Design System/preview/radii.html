<!doctype html>
<html><head><meta charset="utf-8">
<title>Corner Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 24px; background:#fff; }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; }
  .item { display:flex; flex-direction:column; align-items:flex-start; gap:10px; }
  .box { width:100%; height:80px; background:#F7F8FC; border:1px solid var(--border); }
  .tok { font-family: ui-monospace, Menlo, monospace; font-size:12px; color:var(--text-primary); }
  .role { font-size:11px; color:var(--text-muted); }
</style>
</head><body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:10px"></div>
      <div><div class="tok">--radius-sm · 10px</div><div class="role">Chips, tags</div></div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div>
      <div><div class="tok">--radius-md · 12px</div><div class="role">Buttons, cards</div></div></div>
    <div class="item"><div class="box" style="border-radius:15px"></div>
      <div><div class="tok">--radius-lg · 15px</div><div class="role">Large media</div></div></div>
    <div class="item"><div class="box" style="border-radius:9999px"></div>
      <div><div class="tok">--radius-full</div><div class="role">Pills, avatars</div></div></div>
  </div>
</body></html>
