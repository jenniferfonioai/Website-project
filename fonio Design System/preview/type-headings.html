<!doctype html>
<html><head><meta charset="utf-8">
<title>Type — Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 24px; background:#fff; }
  .row { display:grid; gap:10px; }
  .spec { display:grid; grid-template-columns: 1fr auto; align-items:baseline; gap:16px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .label { font-family: ui-monospace, Menlo, monospace; font-size:11px; color:var(--text-muted); }
</style>
</head><body>
  <div class="row">
    <div class="spec"><h1 style="font-size:52px">Webdesign, das funktioniert.</h1><span class="label">H1 · 52/500</span></div>
    <div class="spec"><h2 style="font-size:40px">Die Studio-Arbeit.</h2><span class="label">H2 · 40/500</span></div>
    <div class="spec"><h3 style="font-size:32px">Leistungen im Überblick</h3><span class="label">H3 · 32/500</span></div>
    <div class="spec"><h4 style="font-size:24px">Kurze Projektbeschreibung</h4><span class="label">H4 · 24/500</span></div>
  </div>
</body></html>
